name: Publish to PyPI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Verify release metadata
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          ref = os.environ.get('GITHUB_REF', '')
          m = re.match(r'^refs/tags/v(.+)$', ref)
          tag_version = m.group(1) if m else None

          pyproject = Path('pyproject.toml').read_text(encoding='utf-8')
          project_section = re.split(r'^\[project\]\s*$', pyproject, flags=re.M)
          if len(project_section) < 2:
              raise SystemExit('Could not find [project] section in pyproject.toml')
          project_body = re.split(r'^\[', project_section[1], flags=re.M)[0]
          project_match = re.search(r'^\s*version\s*=\s*"([^"]+)"\s*$', project_body, flags=re.M)
          if not project_match:
              raise SystemExit('Could not find project.version in pyproject.toml')
          project_version = project_match.group(1)

          package_init = Path('src/tokdash/__init__.py').read_text(encoding='utf-8')
          package_match = re.search(r'^__version__\s*=\s*"([^"]+)"\s*$', package_init, flags=re.M)
          if not package_match:
              raise SystemExit('Could not find __version__ in src/tokdash/__init__.py')
          package_version = package_match.group(1)

          if project_version != package_version:
              raise SystemExit(
                  f'pyproject version {project_version} does not match package version {package_version}.'
              )

          if tag_version and tag_version != project_version:
              raise SystemExit(
                  f'Tag v{tag_version} does not match pyproject version {project_version}. '
                  'Retag the release from the correct commit.'
              )

          print('OK', project_version)
          PY

      - name: Install build tools
        run: |
          python -m pip install -U pip
          python -m pip install build twine

      - name: Build
        run: python -m build

      - name: Check dist
        run: twine check dist/*

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    # Keep an explicit environment so PyPI Trusted Publishing can match the OIDC
    # claims (and so you can later enable GitHub Environment protections if you
    # want). This does NOT require manual approval unless you configure
    # protections for the `pypi` environment in GitHub settings.
    environment:
      name: pypi
      url: https://pypi.org/p/tokdash
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
